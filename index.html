<script>
  // Mobile browsers reject Blob URLs for the manifest when installing.
  // Instead, dynamically replace the manifest href with the pre-configured admin manifest.
  const observer = new MutationObserver((mutations) => {
    if (!window.location.pathname.startsWith('/admin')) return;
    
    for (const mutation of mutations) {
      if (mutation.type === 'childList') {
        for (const node of mutation.addedNodes) {
          if (node.tagName === 'LINK' && node.rel === 'manifest') {
            node.href = '/manifest-admin.json';
            observer.disconnect();
          }
        }
      }
    }
  });

  observer.observe(document.head, { childList: true });

  window.addEventListener('DOMContentLoaded', () => {
    if (window.location.pathname.startsWith('/admin')) {
      const manifestLink = document.querySelector('link[rel="manifest"]');
      if (manifestLink) {
        manifestLink.href = '/manifest-admin.json';
      }
    }
  });
</script>
